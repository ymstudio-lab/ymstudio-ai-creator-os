name: Template suggestion
description: Suggest a reusable prompt, script, thumbnail, shot, calendar, asset, or ComfyUI template.
title: "[Template]: "
labels: ["template", "feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest repeatable creator templates that would help people avoid blank pages. Do not include copyrighted private material, API keys, passwords, or client-confidential content.
  - type: input
    id: template_name
    attributes:
      label: Template name
      placeholder: First 5 seconds hook pack, ComfyUI recipe card, product review script
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Shorts
        - Longform
        - Tutorial
        - Review
        - Comparison
        - Thumbnail
        - Hooking
        - ComfyUI
        - Character consistency
        - Asset/license
        - Calendar/publishing
        - Cost tracking
        - Other
    validations:
      required: true
  - type: dropdown
    id: target_module
    attributes:
      label: Target module
      options:
        - Template Library
        - Script Generator
        - Creator Prompt Board
        - Thumbnail Idea Board
        - AI Shot Planner
        - YouTube Calendar
        - Creator Asset Manager
        - ComfyUI Workflow Manager
        - Character Consistency Tool
        - API Cost Tracker
        - Copy only
    validations:
      required: true
  - type: textarea
    id: template_body
    attributes:
      label: Template body
      description: What should the reusable template say or contain?
    validations:
      required: true
  - type: textarea
    id: expected_output
    attributes:
      label: Expected output
      description: What should this template help the user produce?
      placeholder: Hook list, script outline, shot checklist, thumbnail prompt, upload memo, workflow recipe
    validations:
      required: true
